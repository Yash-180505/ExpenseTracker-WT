<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="pblfinal.css">
</head>

<body>

<div class="container">

  <div class="top-bar">
    <h2>Expense Tracker</h2>

    <div>
      <button onclick="printPage()">🖨 Print</button>
      <button onclick="clearAllData()" class="danger">❌ Clear</button>
    </div>
  </div>

  <div class="grid">

    <!-- LEFT -->
    <div class="card">
      <h3>Add Funds</h3>

      <input type="number" id="totalAmount" placeholder="Initial Budget">
      <button onclick="setTotalAmount()">Set Budget</button>

      <input type="number" id="saving-amount" placeholder="Add Savings">
      <button onclick="addSaving()">Add Savings</button>

      <h3>Add Expense</h3>

      <form id="form">
        <input type="text" id="text" placeholder="Description">
        <input type="number" id="amount" placeholder="Amount">
        <input type="date" id="date">
        <button>Add Expense</button>
      </form>
    </div>

    <!-- CENTER -->
    <div class="card">
      <h4>Balance</h4>
      <h1 id="balance">₹0</h1>

      <div class="inc-exp">
        <p>Income: <span id="money-plus">0</span></p>
        <p>Expense: <span id="money-minus">0</span></p>
      </div>

      <canvas id="chart"></canvas>
    </div>

    <!-- RIGHT -->
    <div class="card">
      <h3>History</h3>
      <ul id="list"></ul>
    </div>

  </div>

</div>

<script src="pblfinal.js"></script>
</body>
</html>
